<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#4b9f99">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="鮎釣り記録">
  <title>鮎釣り記録</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="header-label">Ayu Fishing Log</p>
        <h1>鮎釣り記録</h1>
      </div>
      <button class="icon-button" id="quickAddButton" type="button" aria-label="記録を追加">＋</button>
    </header>

    <main>
      <section class="view active" id="view-home" aria-labelledby="homeTitle">
        <div class="section-heading">
          <h2 id="homeTitle">TOP</h2>
          <p>月ごとの釣行記録をカレンダーで確認できます。</p>
        </div>
        <div id="calendarPanel" class="calendar-panel"></div>
        <div id="dayRecordPanel" class="day-record-panel"></div>
      </section>

      <section class="view" id="view-add" aria-labelledby="addTitle">
        <div class="section-heading">
          <h2 id="addTitle">記録追加</h2>
          <p>共通情報、午前、午後を1件の釣行記録として保存します。</p>
        </div>
        <form id="addForm" class="record-form"></form>
      </section>

      <section class="view" id="view-list" aria-labelledby="listTitle">
        <div class="section-heading">
          <h2 id="listTitle">記録一覧</h2>
          <p id="recordCountText">0件の記録</p>
        </div>
        <div class="list-actions">
          <input id="searchInput" type="search" placeholder="河川・ポイント・メモで検索">
        </div>
        <div id="recordList" class="record-list"></div>
      </section>

      <section class="view" id="view-search" aria-labelledby="searchTitle">
        <div class="section-heading">
          <h2 id="searchTitle">検索</h2>
          <p>条件で絞り込み、釣果と道具別ベスト3を確認できます。</p>
        </div>
        <form id="searchForm" class="search-panel"></form>
        <div id="searchSummary" class="summary-grid"></div>
        <div id="searchResults" class="record-list"></div>
        <div id="bestPanel" class="best-panel"></div>
      </section>

      <section class="view" id="view-edit" aria-labelledby="editTitle">
        <div class="section-heading">
          <h2 id="editTitle">記録詳細・編集</h2>
          <p>午前と午後を分けて確認、編集、共有できます。</p>
        </div>
        <form id="editForm" class="record-form"></form>
      </section>

      <section class="view" id="view-settings" aria-labelledby="settingsTitle">
        <div class="section-heading">
          <h2 id="settingsTitle">設定</h2>
          <p>入力項目と選択肢をあとから変更できます。</p>
        </div>
        <div id="fieldSettings" class="settings-stack"></div>
        <div id="optionSettings" class="settings-stack"></div>
      </section>

      <section class="view" id="view-backup" aria-labelledby="backupTitle">
        <div class="section-heading">
          <h2 id="backupTitle">バックアップ</h2>
          <p>CSV出力、JSON保存、JSON復元ができます。</p>
        </div>
        <div id="backupContent" class="backup-panel"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="画面切り替え">
      <button class="nav-button" data-view="add" type="button"><span>＋</span>追加</button>
      <button class="nav-button active" data-view="home" type="button"><span>□</span>TOP</button>
      <button class="nav-button" data-view="list" type="button"><span>☰</span>一覧</button>
      <button class="nav-button" data-view="search" type="button"><span>⌕</span>検索</button>
      <button class="nav-button" data-view="settings" type="button"><span>⚙</span>設定</button>
      <button class="nav-button" data-view="backup" type="button"><span>⇩</span>バックアップ</button>
    </nav>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="actionSheet" class="action-sheet" aria-hidden="true"></div>
  <script src="script.js" charset="utf-8"></script>
</body>
</html>
